<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>505 HTTP Version Not Supported</title>
  <style>
    body {
      background-color: #f2f2f2;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      padding: 60px;
    }
    .container {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 12px;
      display: inline-block;
      padding: 50px 70px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 50px;
      color: #f0ad4e;
      margin-bottom: 15px;
    }
    p {
      font-size: 20px;
      color: #555;
      margin-bottom: 20px;
    }
    a {
      display: inline-block;
      text-decoration: none;
      color: #fff;
      background-color: #f0ad4e;
      padding: 12px 25px;
      border-radius: 6px;
      transition: background 0.3s;
    }
    a:hover {
      background-color: #ec971f;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>505</h1>
    <p>HTTP Version Not Supported: The server does not support the HTTP protocol version used in the request.</p>
    <a href="/">Go Back Home</a>
  </div>
</body>
</html>
