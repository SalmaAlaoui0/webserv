
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Welcome to our server!</title>
    <style>
        body {
            background: linear-gradient(135deg, #fce4ec, #f8bbd0);
            color: #4a148c;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 700px;
            margin: 10% auto;
            background-color: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 6px 30px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 2.8em;
            color: #e91e63; /* Pink */
            margin-bottom: 10px;
        }
        p {
            font-size: 1.3em;
            color: #6a1b9a; /* Purple */
            margin-top: 0;
        }
        .footer {
            margin-top: 35px;
            font-size: 0.95em;
            color: #9c27b0;
        }
        .footer a {
            color: #e91e63;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .emoji {
            font-size: 1.4em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to our server!</h1>
        <p>If you see this page, the server is working correctly <span class="emoji">🎉</span></p>
        <div class="footer">
        </div>
    </div>
</body>
</html>
