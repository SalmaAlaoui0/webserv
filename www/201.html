<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>201 - Created</title>
  <style>
    body {
      background: oklch(96.418% 0.05963 130.138); 
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Verdana', sans-serif;
    }
    .card {
      background: white;
      padding: 55px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 {
      font-size: 4em;
      margin: 30;
      color: hwb(91 16% 34%);
    }
    p {
      font-size: 1.3em;
      margin: 20px 0;
      color: #555;
    }
    a {
      display: inline-block;
      padding: 12px 25px;
      background: hwb(91 16% 34%);
      color: white;
      text-decoration: none;
      border-radius: 25px;
      font-weight: bold;
      transition: 0.3s;
    }
    a:hover {
      background: hwb(91 16% 34%);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>201 Created ✅</h1>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
