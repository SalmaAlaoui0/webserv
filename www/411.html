<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>411 - Length Required</title>
  <style>
    body {
      background: #ffe6f0; /* soft pink */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Verdana', sans-serif;
    }
    .card {
      background: white;
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 {
      font-size: 5em;
      margin: 0;
      color: #ff3366;
    }
    p {
      font-size: 1.3em;
      margin: 20px 0;
      color: #555;
    }
    a {
      display: inline-block;
      padding: 12px 25px;
      background: #ff3366;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      font-weight: bold;
      transition: 0.3s;
    }
    a:hover {
      background: #cc0055;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>411</h1>
    <p>Length Required — The request did not specify the length of its content, which is required by the server.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
