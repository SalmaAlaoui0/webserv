<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>400 Bad Request</title>
  <style>
    body {
      background-color: #f8f8f8;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
    }
    .container {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      display: inline-block;
      padding: 40px 60px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 48px;
      color: #d9534f;
      margin-bottom: 10px;
    }
    p {
      font-size: 18px;
      color: #666;
    }
    a {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      color: #fff;
      background: #d9534f;
      padding: 10px 20px;
      border-radius: 5px;
      transition: background 0.3s;
    }
    a:hover {
      background: #c9302c;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>400</h1>
    <p>Bad Request: Your request could not be understood by the server.</p>
    <a href="/">Go Back Home</a>
  </div>
</body>
</html>
