<!DOCTYPE html>
<html>
  <body>
    <h2>DELETE Request Test</h2>
    <button onclick="deleteFile()">Send DELETE</button>

    <script>
      function deleteFile() {
        fetch("http://localhost:8080/myfile.txt", {
          method: "POST"
        })
        .then(res => {
          console.log("Status:", res.status);
          return res.text();
        })
        .then(data => console.log("Response body:", data))
        .catch(err => console.error("Error:", err));
      }
    </script>
  </body>
</html>
