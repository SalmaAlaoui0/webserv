server {

	listen  127.0.0.1:8090;
	server_name localhost;
	root www;
	index index.html;
     error_page 200 www/200.html;
     error_page 400 www/400.html;
    error_page 403 www/403.html;
    error_page 404 www/404.html;
    error_page 405 www/405.html;
    error_page 413 www/413.html;
    error_page 408 www/408.html;
    error_page 409 www/409.html;
    error_page 201 www/201.html;
    error_page 204 www/204.html;
    error_page 500 www/500.html;
    error_page 502 www/502.html;
    error_page 503 www/503.html;
    error_page 504 www/504.html;
    error_page 505 www/505.html;
    error_page 431 www/431.html;
    error_page 501 www/501.html;
    error_page 411 www/411.html;    
    client_max_body_size 45M;

    location / {
    	    root /home/wzahir/1webserv;
            upload_store /1webserv/www/upload;
            index index.html;
            allowed_methods GET DELETE POST;
            autoindex on;
            #return 302 /upload;
            cgi_pass .py /usr/bin/python3;
	    }

        location /images/home {

    	     root /home/wzahir/images;
            index default.jpg;
            allowed_methods GET POST;
            # allowed_methods POST;
            return 302 /images;
            cgi_pass .py /usr/bin/python3;
        }
	    


	location  /images {
    	    root /home/wzahir/images;
            index file.html;
            client_max_body_size 5K;
            autoindex off;
            # return 302 /;

    }	    


    # location /static/diir/images { 
    #     index index.html;
    #     autoindex off;
    #     allowed_methods GET POST;
    # }

    location /upload {
        root /home/wzahir/1webserv/www/upload;
        allowed_methods GET POST DELETE;
        client_max_body_size 10000000;
    }

    location /delete-me {
        root home/wzahir/folder;
        allowed_methods DELETE;
    }

    location /cgi-bin {
        root /home/wzahir/1webserv;
        upload_store /1webserv/www/upload;
        index time.py;
        cgi_pass .py /usr/bin/python3;
        cgi_pass .php /usr/bin/php-cgi;
        cgi_pass .pl  /usr/bin/perl;
        cgi_pass .sh  /usr/bin/sh;
        allowed_methods GET POST;
    }
}

