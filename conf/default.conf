# Default configuration for Webserv

server {

    listen 127.0.0.1:8080;
    server_name localhost;

    root www;
    index index.html;
    error_page 404 /404.html;
    client_max_body_size 30M;

       location / {
    	    root /home/wzahir;
            index file.html;
            allowed_methods  POST DELETE;
	    }
    location /home/wzahir {
    	    root /home/wzahir;
            index cat.jpg;
            index mouna.txt;
            allowed_methods  POST DELETE;
	    }
    location /images/home {
    	    root /home/wzahir/images;
            index cat.jpg;
             allowed_methods  POST;
	    }

	location  /images {
    	    root /home/wzahir;
            index file.html;
	    }


    location  ~ \.html { 
        root /home/wzahir;
        index index.html;
        autoindex off;
        allowed_methods GET POST;
    }

    location /cgi-bin {
        cgi_pass /cgi-bin/;
        allowed_methods GET POST;
    }
}

